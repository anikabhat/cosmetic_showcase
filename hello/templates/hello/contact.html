{% extends "hello/layout.html" %}
{% block title %}
Contact
{% endblock %}
{% block content %}
<div style="max-width: 800px; padding: 40 px 20px; text-align: left;">
    <h2>Contact Us</h2>
    <p>Have a product in mind? Let us know!</p>

    {% if messages %}
        {% for message in messages %}
            <div style="color: green; padding: 10px; border: 1px solid green; margin-bottom: 10px;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="background: #333; color: white; padding: 10px 20px;">
            Send Message
        </button>
    </form>
</div>
{% endblock %}
